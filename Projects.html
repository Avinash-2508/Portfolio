<head>

  <title>Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Cookie&family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Michroma&family=My+Soul&family=Sacramento&display=swap');
    body {
      background-color: #181818;
      color: #eee;
      font-family: 'poppins', sans-serif; 
    }
    nav a {
      transition: color 0.3s ease;
    }
    nav a.active,nav a:hover {
      color: #f75a41;
      font-weight: 500;
    }
    button.filter-btn {
      background-color: transparent;
      border: 1px solid #2c2c2c;
      color: #eee;
      padding: 0.4rem 1rem;
      border-radius: 0.375rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
      user-select: none;
      font-size: 0.85rem;
    }
    button.filter-btn:hover {
      background-color: #2c2c2c;
      color: #f75a41;
    }
    .project-card {
      border-radius: 0.75rem;
      overflow: hidden;
      background-color: #111;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 0 12px rgb(0 0 0 / 0.6);
      transition: box-shadow 0.3s ease;
    }
    .project-card:hover {
      box-shadow:
        0 0 15px #f75a41cc,
        0 0 30px #f75a41aa;
    }
    .project-img-wrapper {
      border-radius: 0.75rem 0.75rem 0 0;
      overflow: hidden;
      aspect-ratio: 15 / 8;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      margin-bottom: 0.5rem;
      transition: filter 0.3s ease;
    }
    /* Different shadow backgrounds for each card */
    .bg-blue-glow {
      box-shadow:
        inset 0 0 80px #2974fe,
        0 0 40px #1c49cb;
      background-color: #1161bb;
    }
    .bg-lightblue-glow {
      box-shadow:
        inset 0 0 90px #768fff,
        0 0 40px #465bbf;
      background-color: #1b39db;
    }
    .bg-red-glow {
      box-shadow:
        inset 0 0 80px #f85a5a,
        0 0 40px #cb1c1c;
      background-color: #f94e4e;
    }
    .bg-yellow-glow {
      box-shadow:
        inset 0 0 80px #f9d54e,
        0 0 40px #bfa31c;
      background-color: #f3cd4e;
    }
    .bg-green-glow {
      box-shadow:
        inset 0 0 80px #94f95a,
        0 0 40px #4cb91c;
      background-color: #8ce949;
    }
    .bg-pink-glow {
      box-shadow:
        inset 0 0 80px #f994d5,
        0 0 40px #bf1c94;
      background-color: #f983d6;
    }
    .project-info {
      padding: 0 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .project-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eee;
      margin-bottom: 0.25rem;
    }
    .project-actions {
      display: flex;
      justify-content: flex-start;
      gap: 1rem;
      margin-top: auto;
    }
    .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: #eee;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
      border-radius: 0.375rem;
      background: #222;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      user-select: none;
    }
    .btn-link:hover {
      background-color: #f75a41;
      border-color: #f75a41;
      color: #fff;
    }
    .btn-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    header nav {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 2rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
      justify-content: space-between;
    }
    .logo {
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 30% 70%, #f75a41 0%, #cd3210 80%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 2rem;
      color: yellow;
      font-family: "Sacramento";
      font-weight: 900;
      user-select: none;
      box-shadow: 0 0 10px #f75a41;
    }
    .logo:hover {
    animation: spinAnimate 2s ease 0s infinite normal;
}

@keyframes spinAnimate {
    from {
        transform: rotate(0deg);
    }

    to {
        transform: rotate(360deg);
    }
}
    .nav-links {
      display: flex;
      gap: 1.6rem;
      font-weight: 400;
      font-size: 1rem;
    }
    main {
      max-width: 1200px;
      margin: 1rem auto 3rem;
      padding: 0 1rem;
    }
    main > section.title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    main > section.title-row h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #7986ff;
      user-select: none;
    }
    main > section.title-row button {
      user-select: none;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.4rem;
    }
    @media (max-width: 768px) {
      header nav {
        gap: 1rem;
        padding: 1rem;
      }
      .nav-links {
        gap: 1rem;
        font-size: 0.9rem;
      }
      main > section.title-row h1 {
        font-size: 2rem;
      }

    }

/* -----------------------------------------------footer------------------------------------------------------- */
    footer {
    padding: 100px 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

.inner {
    height: 300px;
}

.inner p {
    font-size: 48px;
    font-weight: 600;
}

.icons {
    display: flex;
    justify-content: center;
}

.icons a {
    color: white;
    margin-top: 12px;
    margin: 8px;
    font-size: 1.5rem;
}

.mail-box {
    display: flex;
    justify-content: center;
    height: 120px;
    border: 2px solid #1d1d1d;
    border-radius: 10px;
}

.mail-box input {
    padding: 10px 25px;
    border: none;
    margin-top: 20px;
    border-top-left-radius: 10px;
    border-bottom-left-radius: 10px;
    background-color: #1d1d1d;
}

.mail-box button {
    padding: 10px 15px;
    border: none;
    border-top-right-radius: 10px;
    border-bottom-right-radius: 10px;
    background-color: #252525;
    color: white;
    cursor: pointer;
}

.out p {
    font-size: 20px;
    text-align: center;
}

.copyright {
    display: flex;
    justify-content: center;
}

.copyright p {
    margin-top: 90px;
    font-size: 20px;
    font-weight: 500;

}

.sidebar {
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    width: 200px;
    z-index: 999;
    background-color: #252525;
    box-shadow: -10px 0 10px rgba(0, 0, 0, 0.1);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
}

.cancel {
    position: relative;
    top: 10px;
    left: 80px;
}



::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #1a1a1a;
    border-radius: 10px;
    box-shadow:
        inset 0 0 10px rgba(255, 60, 0, 0.8),
        /* inner glow */
        0 0 15px rgba(255, 60, 0, 1),
        /* strong outer glow */
        0 0 30px rgba(255, 30, 0, 0.9);
    /* extended glow */
}

::-webkit-scrollbar-thumb {
    background: #ff5403;
    border-radius: 10px;
}

    <script>document.addEventListener('DOMContentLoaded', function() {

    const form = document.getElementById('celebrationForm');
    const successMessage = document.getElementById('successMessage');
    const confettiContainer = document.getElementById('confetti-container');
    

    const colors = [
        '#f94144', '#f3722c', '#f8961e', '#f9c74f', 
        '#90be6d', '#43aa8b', '#4d908e', '#577590', 
        '#277da1', '#ff66c4', '#9b5de5'
    ];
    
    const shapes = ['square', 'triangle', 'circle'];
    
    form.addEventListener('submit', function(event) {
        event.preventDefault();
        
        successMessage.style.display = 'block';
        
        createConfetti();
        
        setTimeout(() => {
            form.reset();
            successMessage.style.display = 'none'; 
        }, 3000);
    });
    
    function createConfetti() {
        const confettiCount = 250;
        
        confettiContainer.innerHTML = '';
        
        for (let i = 0; i < confettiCount; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                
                // Random position, color, shape and size
                const size = Math.random() * 10 + 6; // Between 6-16px
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100; 
                
                // Apply styles
                confetti.className = `confetti ${shape}`;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.left = `${left}%`;
                confetti.style.top = '-20px';
                confetti.style.opacity = '1';
                
                const rotation = Math.random() * 360;
                confetti.style.transform = `rotate(${rotation}deg)`;
                
                confettiContainer.appendChild(confetti);
                
                animateConfetti(confetti);
            }, i * 20); 
        }
    }
    
    function animateConfetti(element) {
        const horizontalMovement = (Math.random() - 0.5) * 15;
        
        const fallSpeed = Math.random() * 3 + 2;
        
        const spinSpeed = Math.random() * 15 - 7.5;
        
        let top = -20;
        let rotation = Math.random() * 360;
        let opacity = 1;
        let horizontalPos = parseFloat(element.style.left);
        
        // Animation function
        function fall() {
            top += fallSpeed;
            rotation += spinSpeed;
            horizontalPos += horizontalMovement / 10;
            
            element.style.top = `${top}px`;
            element.style.transform = `rotate(${rotation}deg)`;
            element.style.left = `${horizontalPos}%`;
            
            if (top > window.innerHeight * 0.7) {
                opacity -= 0.03;
                element.style.opacity = opacity;
            }
            
            if (top < window.innerHeight && opacity > 0) {
                requestAnimationFrame(fall);
            } else {
                if (element.parentNode) {
                    element.parentNode.removeChild(element);
                }
            }
        }
        
        // Start animation
        requestAnimationFrame(fall);
    }
});
</script>
