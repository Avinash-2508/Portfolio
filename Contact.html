<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1c1c1c;
            font-family: "Poppins", sans-serif;
            color: white;
        }

        /* --------------------------------------------NAVBAR---------------------------------------------- */

        .left img {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            margin-top: 10px;
        }

        .left img:hover {
            animation: spinAnimate 2s ease 0s infinite normal;
        }

                @keyframes spinAnimate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }



        /* @keyframes fadeIn{
    from{opacity: 0;transform: translateY(-200px);}
    to{opacity: 1;transform: translateY(0);}
} */
        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: #ff5403;
            height: 80px;
            /* background-color: #1d1d1d; */
        }

        .left {
            font-size: 1.5rem;
        }

        .Hamburger {
            display: none;
        }

        nav ul {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
        }

        nav ul li {
            list-style: none;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            position: relative;
        }

        nav ul li a::after {
            content: ' ';
            width: 0;
            height: 3px;
            background-color: #ff5403;
            position: absolute;
            left: 0;
            bottom: -6px;
            transition: 0.5s;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 200px;
            z-index: 999;
            background-color: #252525;
            box-shadow: -10px 0 10px rgba(0, 0, 0, 0.1);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .cancel {
            position: relative;
            top: 10px;
            left: 80px;
        }

        /* -----------------------------------------------------Footer------------------------------------------------------ */

        footer {
            padding: 100px 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .inner {
            height: 300px;
        }

        .inner p {
            font-size: 48px;
            font-weight: 600;
        }

        .icons {
            display: flex;
            justify-content: center;
        }

        .icons a {
            color: white;
            margin-top: 12px;
            margin: 8px;
            font-size: 1.5rem;
        }

        .mail-box {
            display: flex;
            justify-content: center;
            height: 120px;
            border: 2px solid #1d1d1d;
            border-radius: 10px;
        }

        .mail-box input {
            padding: 10px 25px;
            border: none;
            margin-top: 20px;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            background-color: #1d1d1d;
        }

        .mail-box button {
            padding: 10px 15px;
            border: none;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            background-color: #252525;
            color: white;
            cursor: pointer;
        }

        .out p {
            font-size: 20px;
            text-align: center;
        }

        .copyright {
            display: flex;
            justify-content: center;
        }

        .copyright p {
            margin-top: 90px;
            font-size: 20px;
            font-weight: 500;

        }

        .outter {
            padding: 50px 130px;
            display: flex;
            justify-content: space-between;
        }

        .contact {
            font-size: 48px;
            color: rgb(132, 161, 255);
            margin-bottom: 60px;
            font-weight: 500;
        }

        .input {
            margin-top: 20px;
            margin-bottom: 20px;
            width: 500px;
            height: 35px;
            background-color: #1c1c1c;
            color: white;
            border: 1px solid #252525;
            border-radius: 8px;
        }

        .label {
            font-size: 14px;
        }

        input:focus {
            border: 2px solid #ff5403;
            outline: none;
        }

        textarea {
            width: 500px;
            height: 150px;
            resize: vertical;
            background-color: #1c1c1c;
            color: white;
            border: 1px solid #252525;
            margin-top: 20px;
        }

        textarea:focus {
            border: 2px solid #ff5403;
            outline: none;
            border-radius: 8px;
        }

        .Send {
            margin-top: 20px;
            /* width: 500px;
            height: 35px; */
            background-color: #ff5403;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 13px 235px;
            text-align: center;
            font-size: 18px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.7);
            transition: 0.3s ease;
        }

        .glow-button:active {
            border: 5px solid #ff5403;
        }



        /* ----------------------------------------------scroll-bar------------------------------------------- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
            box-shadow:
                inset 0 0 10px rgba(255, 60, 0, 0.8),
                /* inner glow */
                0 0 15px rgba(255, 60, 0, 1),
                /* strong outer glow */
                0 0 30px rgba(255, 30, 0, 0.9);
            /* extended glow */
        }

        ::-webkit-scrollbar-thumb {
            background: #ff5403;
            border-radius: 10px;
        }

        @media (max-width:768px) {
            .Hamburger {
                display: block;
            }

            .hamb {
                display: none;
            }
        }

        @media (max-width: 950px) {
            header nav {
                justify-content: space-between;
            }

            .left {

            }

            .right {

            }
        }

        @media (max-width:1000px) {
            .outter {

                display: block;
                width: 100%;
            }

            .leftout form {

                padding: 20px 1px;

                height: 35px;
                background-color: #1c1c1c;
                color: white;
                border: 1px solid #252525;
                border-radius: 8px;
            }

            .Send {
                padding: 13px 160px;
            }

            textarea {
                width: 350px;
                height: 150px;
                resize: vertical;

                border: 1px solid #252525;
                margin-top: 20px;

            .Link .or {

            }
        }
        @media (max-width:500px) {


        }

        .rightout {
            display: flex;

        }

        .or {

        }

        .messageme {

        }

        .buttons button {

            border: none;
            background-color: #252525;
            padding: 7px 14px;
            border-radius: 5px;
            color: white;
            text-align: center;
        }

        .links {
            display: flex;
        }
    </style>
